<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Kuchenkoordination – Abschlussfeier 1. Klasse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    :root {
      --bg: #FFF9F0; --card: #FFFFFF; --accent: #F4845F;
      --green: #43AA8B; --red: #cc3300;
      --text: #2D2D2D; --muted: #888; --border: #EEE; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

    header { background: linear-gradient(135deg, #F4845F 0%, #e8614a 100%); color: white; padding: 28px 20px 24px; text-align: center; }
    header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    header p { font-size: 0.95rem; opacity: 0.9; }
    .date-badge { display: inline-block; background: rgba(255,255,255,0.25); border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; font-weight: 700; margin-top: 10px; }

    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
    .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 24px 0 10px; }

    input[type=text] { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 1rem; background: var(--card); outline: none; transition: border-color 0.2s; margin-bottom: 10px; }
    input[type=text]:focus { border-color: var(--accent); }

    .btn { display: block; width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 4px; transition: background 0.2s, transform 0.1s; }
    .btn:hover { background: #e8614a; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .counter-bar { background: var(--card); border-radius: var(--radius); padding: 14px 18px; border: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .counter-bar span:first-child { font-size: 0.9rem; color: var(--muted); font-weight: 600; }
    .counter-bar span:last-child { font-size: 1.2rem; font-weight: 800; color: var(--accent); }

    .entry-list { display: flex; flex-direction: column; gap: 10px; }
    .entry { background: var(--card); border-radius: var(--radius); padding: 14px 16px; border: 2px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .entry.mine { border-color: var(--green); background: #f0faf6; }
    .entry-emoji { font-size: 1.6rem; flex-shrink: 0; }
    .entry-info { flex: 1; min-width: 0; }
    .entry-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-kuchen { font-size: 0.82rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .mine-badge { font-size: 0.72rem; font-weight: 700; color: var(--green); background: #e0f5ed; padding: 2px 8px; border-radius: 20px; }
    .admin-badge { font-size: 0.72rem; font-weight: 700; color: white; background: #888; padding: 2px 8px; border-radius: 20px; }
    .delete-btn { background: none; border: none; font-size: 0.75rem; color: var(--red); cursor: pointer; text-decoration: underline; font-family: inherit; padding: 0; }

    .empty { text-align: center; color: var(--muted); padding: 30px; font-size: 0.9rem; background: var(--card); border-radius: var(--radius); border: 2px dashed var(--border); }

    .admin-banner { background: #fff3cd; border: 2px solid #ffc107; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
    .admin-banner strong { display: block; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2D2D2D; color: white; padding: 12px 22px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media print {
      header { background: none !important; color: black !important; border-bottom: 2px solid #ccc; }
      .btn, input, .delete-btn, .admin-banner { display: none !important; }
      .entry { break-inside: avoid; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎂 Abschlussfeier 1. Klasse</h1>
  <p>Wer bringt welchen Kuchen mit?</p>
  <div class="date-badge">📅 09. Juli · 14:30 – 16:00 Uhr</div>
</header>

<div class="container">

  <div class="admin-banner" id="adminBanner" style="display:none">
    🔧 <div><strong>Admin-Modus aktiv</strong>Du kannst alle Einträge löschen.</div>
  </div>

  <p class="section-title">Dein Eintrag</p>
  <input type="text" id="nameInput" placeholder="Dein Name (z.B. Familie Müller)" maxlength="50" />
  <input type="text" id="kuchenInput" placeholder="Was bringst du mit? (z.B. Erdbeerkuchen)" maxlength="80" />
  <button class="btn" id="submitBtn" disabled>Eintragen 🎂</button>

  <p class="section-title">Wer bringt was?</p>
  <div class="counter-bar">
    <span>Anmeldungen bisher</span>
    <span id="counterNum">–</span>
  </div>
  <div class="entry-list" id="entryList">
    <div class="empty">Lade… 🍰</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const FIREBASE_URL = "https://otterklasse-c7d51-default-rtdb.europe-west1.firebasedatabase.app";
  const ADMIN_PW = "Otterklasse2025";
  const DB = `${FIREBASE_URL}/kuchen`;

  const isAdmin = new URLSearchParams(window.location.search).get("admin") === ADMIN_PW;
  if (isAdmin) document.getElementById("adminBanner").style.display = "flex";

  let state = {};
  let myId = localStorage.getItem("kuchenId") || null;

  const nameInput  = document.getElementById("nameInput");
  const kuchenInput= document.getElementById("kuchenInput");
  const submitBtn  = document.getElementById("submitBtn");
  const entryList  = document.getElementById("entryList");
  const counterNum = document.getElementById("counterNum");

  const EMOJIS = ["🍰","🎂","🧁","🍩","🍪","🍫","🎉","🌸"];
  function emoji(name) { return EMOJIS[name.charCodeAt(0) % EMOJIS.length]; }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  async function fetchState() {
    try {
      const res = await fetch(`${DB}.json`);
      state = await res.json() || {};
    } catch(e) { state = {}; }
  }

  function render() {
    const entries = Object.entries(state).sort((a,b) => a[1].ts - b[1].ts);
    counterNum.textContent = entries.length;

    if (entries.length === 0) {
      entryList.innerHTML = `<div class="empty">Noch keine Einträge – sei der Erste! 🍰</div>`;
      return;
    }

    entryList.innerHTML = entries.map(([id, v]) => {
      const isMine = id === myId;
      const canDelete = isMine || isAdmin;
      return `
        <div class="entry${isMine ? " mine" : ""}">
          <div class="entry-emoji">${emoji(v.name)}</div>
          <div class="entry-info">
            <div class="entry-name">${v.name}</div>
            <div class="entry-kuchen">🎂 ${v.kuchen}</div>
          </div>
          <div class="entry-actions">
            ${isMine ? `<span class="mine-badge">✓ Ich</span>` : ""}
            ${isAdmin && !isMine ? `<span class="admin-badge">Admin</span>` : ""}
            ${canDelete ? `<button class="delete-btn" data-id="${id}">Löschen</button>` : ""}
          </div>
        </div>`;
    }).join("");

    entryList.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("Eintrag wirklich löschen?")) return;
        await fetch(`${DB}/${btn.dataset.id}.json`, { method: "DELETE" });
        if (btn.dataset.id === myId) {
          myId = null;
          localStorage.removeItem("kuchenId");
        }
        await fetchState();
        render();
        showToast("Eintrag gelöscht 👍");
      });
    });
  }

  function updateBtn() {
    const alreadyIn = !!myId && !!state[myId];
    submitBtn.disabled = alreadyIn || nameInput.value.trim().length < 2 || kuchenInput.value.trim().length < 2;
    submitBtn.textContent = alreadyIn ? "Du bist bereits eingetragen ✓" : "Eintragen 🎂";
  }

  nameInput.addEventListener("input", updateBtn);
  kuchenInput.addEventListener("input", updateBtn);

  submitBtn.addEventListener("click", async () => {
    submitBtn.disabled = true;
    submitBtn.textContent = "Speichern…";
    const res = await fetch(`${DB}.json`, {
      method: "POST",
      body: JSON.stringify({ name: nameInput.value.trim(), kuchen: kuchenInput.value.trim(), ts: Date.now() })
    });
    const data = await res.json();
    myId = data.name;
    localStorage.setItem("kuchenId", myId);
    nameInput.value = "";
    kuchenInput.value = "";
    await fetchState();
    render();
    updateBtn();
    showToast("Danke! Dein Kuchen ist eingetragen 🎉");
  });

  fetchState().then(() => { render(); updateBtn(); });
  setInterval(() => fetchState().then(() => { render(); updateBtn(); }), 10000);
</script>
</body>
</html>
